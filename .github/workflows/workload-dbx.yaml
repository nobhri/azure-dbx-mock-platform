name: workload-dbx
on:
  pull_request:
    paths: [ "infra/workload-dbx/**" ]
  push:
    branches: [ "main" ]
    paths: [ "infra/workload-dbx/**" ]
  workflow_dispatch:
    inputs:
      destroy:
        type: boolean
        default: false

concurrency:
  group: tf-workload-dbx
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  TFSTATE_RG_NAME: rg-tfstate
  TFSTATE_SA_NAME: st${{ secrets.TFSTATE_SA_UNIQ }}tfstate
  TFSTATE_CONTAINER: workload-tfstate
  TFSTATE_KEY: dbx.tfstate
  RG_NAME: rg-mock-data

jobs:
  tf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # --- Read outputs from workload-azure state (to feed variables here) ---
      - name: Init workload-azure backend to read outputs
        run: |
          terraform -chdir=infra/workload-azure init \
            -backend-config="resource_group_name=$TFSTATE_RG_NAME" \
            -backend-config="storage_account_name=$TFSTATE_SA_NAME" \
            -backend-config="container_name=workload-tfstate" \
            -backend-config="key=azure.tfstate"

      - name: Capture workload-azure outputs
        id: azout
        run: |
          echo "WORKSPACE_RESOURCE_ID=$(terraform -chdir=infra/workload-azure output -raw workspace_resource_id)" >> $GITHUB_OUTPUT
          echo "WORKSPACE_NAME=$(terraform -chdir=infra/workload-azure output -raw workspace_name)" >> $GITHUB_OUTPUT
          echo "ACCESS_CONNECTOR_ID=$(terraform -chdir=infra/workload-azure output -raw access_connector_id)" >> $GITHUB_OUTPUT
          echo "STORAGE_ACCOUNT_NAME=$(terraform -chdir=infra/workload-azure output -raw storage_account_name)" >> $GITHUB_OUTPUT
          echo "UC_ROOT_CONTAINER=$(terraform -chdir=infra/workload-azure output -raw uc_root_container)" >> $GITHUB_OUTPUT

      - name: Preflight — break stale lease if any
        run: |
          az storage blob show \
            --account-name $TFSTATE_SA_NAME \
            --container-name $TFSTATE_CONTAINER \
            --name $TFSTATE_KEY \
            --auth-mode login \
            --query "properties.leaseState" -o tsv 2>/dev/null | grep -q leased && \
          az storage blob lease break \
            --account-name $TFSTATE_SA_NAME \
            --container-name $TFSTATE_CONTAINER \
            --blob-name $TFSTATE_KEY \
            --auth-mode login || true

      - name: Terraform Init (remote backend)
        run: |
          terraform -chdir=infra/workload-dbx init -upgrade \
            -backend-config="resource_group_name=$TFSTATE_RG_NAME" \
            -backend-config="storage_account_name=$TFSTATE_SA_NAME" \
            -backend-config="container_name=$TFSTATE_CONTAINER" \
            -backend-config="key=$TFSTATE_KEY"

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        run: |
          tflint --init --chdir=infra/workload-dbx
          tflint --chdir=infra/workload-dbx

      # Discover and import an existing metastore into Terraform state if needed.
      # Handles the "failed-destroy recovery" case: if a previous destroy run failed
      # mid-way, the metastore may still exist in the account but no longer be in state.
      # If the metastore was successfully destroyed, this step is a no-op and Terraform
      # will create a fresh one on apply.
      - name: Import metastore if it exists but not in state
        if: inputs.destroy != true
        run: |
          if terraform -chdir=infra/workload-dbx state show databricks_metastore.this > /dev/null 2>&1; then
            echo "Metastore already in Terraform state — skipping import"
            exit 0
          fi
          TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)
          EXISTING_ID=$(curl -sf \
            -H "Authorization: Bearer $TOKEN" \
            "https://accounts.azuredatabricks.net/api/2.0/accounts/${{ secrets.DATABRICKS_ACCOUNT_ID }}/metastores" \
            | jq -r '.metastores[]? | .metastore_id' | head -1)
          if [ -z "$EXISTING_ID" ]; then
            echo "No existing metastore found — Terraform will create a fresh one"
            exit 0
          fi
          echo "Found existing metastore $EXISTING_ID — importing into Terraform state"
          terraform -chdir=infra/workload-dbx import \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="resource_group_name=$RG_NAME" \
            -var="databricks_account_id=${{ secrets.DATABRICKS_ACCOUNT_ID }}" \
            -var="azure_workspace_resource_id=${{ steps.azout.outputs.WORKSPACE_RESOURCE_ID }}" \
            -var="workspace_name=${{ steps.azout.outputs.WORKSPACE_NAME }}" \
            -var="access_connector_id=${{ steps.azout.outputs.ACCESS_CONNECTOR_ID }}" \
            -var="storage_account_name=${{ steps.azout.outputs.STORAGE_ACCOUNT_NAME }}" \
            -var="uc_root_container=${{ steps.azout.outputs.UC_ROOT_CONTAINER }}" \
            databricks_metastore.this "$EXISTING_ID"

      - name: Terraform Plan (PR)
        if: github.event_name == 'pull_request'
        run: |
          terraform -chdir=infra/workload-dbx plan -input=false -no-color \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="resource_group_name=$RG_NAME" \
            -var="databricks_account_id=${{ secrets.DATABRICKS_ACCOUNT_ID }}" \
            -var="azure_workspace_resource_id=${{ steps.azout.outputs.WORKSPACE_RESOURCE_ID }}" \
            -var="workspace_name=${{ steps.azout.outputs.WORKSPACE_NAME }}" \
            -var="access_connector_id=${{ steps.azout.outputs.ACCESS_CONNECTOR_ID }}" \
            -var="storage_account_name=${{ steps.azout.outputs.STORAGE_ACCOUNT_NAME }}" \
            -var="uc_root_container=${{ steps.azout.outputs.UC_ROOT_CONTAINER }}"

      - name: Terraform Apply (main)
        if: github.ref == 'refs/heads/main' && inputs.destroy != true
        env: { TF_IN_AUTOMATION: "1" }
        run: |
          terraform -chdir=infra/workload-dbx apply -auto-approve -input=false -lock-timeout=10m -no-color \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="resource_group_name=$RG_NAME" \
            -var="databricks_account_id=${{ secrets.DATABRICKS_ACCOUNT_ID }}" \
            -var="azure_workspace_resource_id=${{ steps.azout.outputs.WORKSPACE_RESOURCE_ID }}" \
            -var="workspace_name=${{ steps.azout.outputs.WORKSPACE_NAME }}" \
            -var="access_connector_id=${{ steps.azout.outputs.ACCESS_CONNECTOR_ID }}" \
            -var="storage_account_name=${{ steps.azout.outputs.STORAGE_ACCOUNT_NAME }}" \
            -var="uc_root_container=${{ steps.azout.outputs.UC_ROOT_CONTAINER }}"

      - name: Terraform Destroy (manual)
        if: inputs.destroy == true
        run: |
          terraform -chdir=infra/workload-dbx destroy -auto-approve -input=false -lock-timeout=10m -no-color \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="resource_group_name=$RG_NAME" \
            -var="databricks_account_id=${{ secrets.DATABRICKS_ACCOUNT_ID }}" \
            -var="azure_workspace_resource_id=${{ steps.azout.outputs.WORKSPACE_RESOURCE_ID }}" \
            -var="workspace_name=${{ steps.azout.outputs.WORKSPACE_NAME }}" \
            -var="access_connector_id=${{ steps.azout.outputs.ACCESS_CONNECTOR_ID }}" \
            -var="storage_account_name=${{ steps.azout.outputs.STORAGE_ACCOUNT_NAME }}" \
            -var="uc_root_container=${{ steps.azout.outputs.UC_ROOT_CONTAINER }}"

      - name: Break lease if cancelled
        if: cancelled()
        run: |
          az storage blob lease break \
            --account-name $TFSTATE_SA_NAME \
            --container-name $TFSTATE_CONTAINER \
            --blob-name $TFSTATE_KEY \
            --auth-mode login || true
