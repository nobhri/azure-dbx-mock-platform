name: guardrails
on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths:
      - "infra/guardrails/**"

permissions:
  id-token: write
  contents: read

env:
  TFSTATE_RG_NAME: rg-tfstate
  TFSTATE_SA_NAME: st${{ secrets.TFSTATE_SA_UNIQ }}tfstate
  TFSTATE_CONTAINER: guardrails-tfstate
  TFSTATE_KEY: guardrails.tfstate

  # ---- Variables for guardrails layer ----
  # Provide ALERT_EMAIL (Repo Secret) or maintain a tfvars in guardrails.
  SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  BUDGET_AMOUNT: "2000"                 # override if you like
  BUDGET_START: "2025-01-01T00:00:00Z"
  BUDGET_END:   "2026-01-01T00:00:00Z"
  ALERT_EMAIL:  ${{ secrets.ALERT_EMAIL }}

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform init (remote backend)
        run: |
          terraform -chdir=infra/guardrails init \
            -backend-config="resource_group_name=${TFSTATE_RG_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_SA_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Terraform apply (budget + alerts)
        run: |
          terraform -chdir=infra/guardrails apply -auto-approve \
            -var="subscription_id=${SUBSCRIPTION_ID}" \
            -var="budget_amount=${BUDGET_AMOUNT}" \
            -var="budget_start=${BUDGET_START}" \
            -var="budget_end=${BUDGET_END}" \
            -var='alert_emails=["'${ALERT_EMAIL}'"]'
