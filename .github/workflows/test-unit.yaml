name: unit-tests

on:
  pull_request:
    paths:
      - "etl/src/**"
      - "etl/tests/unit/**"
      - "etl/pyproject.toml"
      - ".github/workflows/test-unit.yaml"
  push:
    branches: ["main"]
    paths:
      - "etl/src/**"
      - "etl/tests/unit/**"
      - "etl/pyproject.toml"
      - ".github/workflows/test-unit.yaml"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install package and test dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=mock_platform --cov-report=term-missing --cov-fail-under=80

      - name: Build wheel
        run: pip install build && python -m build --wheel --outdir dist/
