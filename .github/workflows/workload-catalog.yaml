name: workload-catalog
on:
  push:
    branches: [ "main" ]
    paths: [ "platform/**" ]
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target to deploy (dev|staging)"
        type: choice
        options: [ "dev", "staging" ]
        default: dev

concurrency:
  group: catalog-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'prod' }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  TFSTATE_RG_NAME: rg-tfstate
  TFSTATE_SA_NAME: st${{ secrets.TFSTATE_SA_UNIQ }}tfstate

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Init workload-azure backend to read outputs
        run: |
          terraform -chdir=infra/workload-azure init \
            -backend-config="resource_group_name=$TFSTATE_RG_NAME" \
            -backend-config="storage_account_name=$TFSTATE_SA_NAME" \
            -backend-config="container_name=workload-tfstate" \
            -backend-config="key=azure.tfstate"

      - name: Capture workload-azure outputs
        id: azout
        run: |
          echo "WORKSPACE_URL=$(terraform -chdir=infra/workload-azure output -raw workspace_url)" >> $GITHUB_OUTPUT
          echo "STORAGE_ACCOUNT_NAME=$(terraform -chdir=infra/workload-azure output -raw storage_account_name)" >> $GITHUB_OUTPUT
          echo "UC_ROOT_CONTAINER=$(terraform -chdir=infra/workload-azure output -raw uc_root_container)" >> $GITHUB_OUTPUT

      - name: Set DATABRICKS_HOST
        run: echo "DATABRICKS_HOST=https://${{ steps.azout.outputs.WORKSPACE_URL }}" >> $GITHUB_ENV

      - name: Acquire Databricks token via Azure CLI
        run: |
          TOKEN=$(az account get-access-token \
            --resource 2ff814a6-3304-4ab8-85cb-cd0e6f879c1d \
            --query accessToken -o tsv)
          echo "DATABRICKS_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Set bundle target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TARGET=prod" >> $GITHUB_OUTPUT
          else
            echo "TARGET=${{ inputs.target }}" >> $GITHUB_OUTPUT
          fi

      - name: Preflight — verify UC external location exists
        run: |
          COUNT=$(databricks external-locations list --output json \
            | jq '[.[] | select(.name == "uc-root-location")] | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::UC external location 'uc-root-location' not found."
            echo "  workload-dbx must be applied before workload-catalog."
            echo "  See docs/runbooks/destroy-recreate.md for the required deployment order."
            exit 1
          fi
          echo "Preflight passed: external location 'uc-root-location' found."

      - name: Bundle deploy
        working-directory: platform
        run: |
          databricks bundle deploy --target ${{ steps.target.outputs.TARGET }} \
            --var "storage_account_name=${{ steps.azout.outputs.STORAGE_ACCOUNT_NAME }}" \
            --var "uc_root_container=${{ steps.azout.outputs.UC_ROOT_CONTAINER }}"

      - name: Bundle run — setup_catalog_schema
        working-directory: platform
        run: |
          databricks bundle run setup_catalog_schema \
            --target ${{ steps.target.outputs.TARGET }} \
            --var "storage_account_name=${{ steps.azout.outputs.STORAGE_ACCOUNT_NAME }}" \
            --var "uc_root_container=${{ steps.azout.outputs.UC_ROOT_CONTAINER }}" \
            --no-wait=false
