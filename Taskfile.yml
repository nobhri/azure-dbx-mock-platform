  # =========================================================
  # Orchestrated flows (mirror CI intent)
  # =========================================================
  plan:all:
    desc: "Plan azure -> dbx in order"
    cmds:
      - task: azure:plan
      - task: dbx:plan

  apply:all:
    desc: "Apply azure -> dbx in order"
    cmds:
      - task: azure:apply
      - task: dbx:apply

  destroy:all:
    desc: "Destroy dbx -> azure (reverse order)"
    cmds:
      - task: dbx:destroy
      - task: azure:destroy

  # =========================================================
  # Guards & utilities
  # =========================================================
  check:env:
    desc: "Verify required environment variables are present"
    cmds:
      - test -n "{{.AZURE_SUBSCRIPTION_ID}}" || (echo "Missing AZURE_SUBSCRIPTION_ID"; exit 1)
      - test -n "{{.AZURE_TENANT_ID}}" || (echo "Missing AZURE_TENANT_ID"; exit 1)
      - echo "Azure env OK"
      - test -n "{{.DATABRICKS_HOST}}" || (echo "Missing DATABRICKS_HOST"; exit 1)
      - echo "Databricks host OK"
      - echo "Tip:\ Never store secrets in VCS. Prefer OIDC over long-lived tokens."

  tidy:
    desc: "Clean temporary files (.terraform, plan files)"
    cmds:
      - find "{{.TF_DIR}}" -maxdepth 1 -name "{{.PLAN}}" -delete || true
      - rm -rf "{{.TF_DIR}}/.terraform" || true
      - echo "Cleaned plan file and .terraform directory"
