bundle:
  name: mock-platform-catalog

variables:
  storage_account_name:
    description: "ADLS Gen2 storage account name (from workload-azure TF output)"
    default: ""
  uc_root_container:
    description: "ADLS container for UC metastore root (from workload-azure TF output)"
    default: ""

targets:
  dev:
    mode: development
  prod:
    mode: production

resources:
  jobs:
    setup_platform:
      name: "setup_platform"
      tasks:
        - task_key: platform_ddl_and_grants
          notebook_task:
            notebook_path: ./notebooks/setup_platform.py
            source: WORKSPACE
            base_parameters:
              storage_account_name: "${var.storage_account_name}"
              uc_root_container: "${var.uc_root_container}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.master: "local[*, 4]"
              spark.databricks.cluster.profile: "singleNode"
            custom_tags:
              ResourceClass: SingleNode
      queue:
        enabled: true
